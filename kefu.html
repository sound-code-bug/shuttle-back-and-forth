    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

      <!-- 服务卡片 1：退换货 -->
      <div class="bg-white rounded-xl p-8 shadow-sm border border-gray-100 hover-lift cursor-pointer">
        <div class="mb-5 text-blue-500">

        <p class="text-gray-500 text-sm leading-relaxed">
          丢卡、无信号/质量问题等，支持退换货及售后申请，提供邮寄地址信息。
        </p>
      </div>

      <!-- 服务卡片 2：网络连接 -->
      <div class="bg-white rounded-xl p-8 shadow-sm border border-gray-100 hover-lift cursor-pointer">
        <div class="mb-5 text-green-500">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

            </path>
          </svg>
        </div>
        <h3 class="text-lg font-bold text-gray-900 mb-3">网络连接排障</h3>
        <p class="text-gray-500 text-sm leading-relaxed">
          无信号、网络慢、无法连接等问题，提供配置指南，以及 APN 配置说明。
        </p>
      </div>

      <!-- 服务卡片 3：卡片激活 -->
      <div class="bg-white rounded-xl p-8 shadow-sm border border-gray-100 hover-lift cursor-pointer">
        <div class="mb-5 text-purple-500">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

            </path>
          </svg>
        </div>
        <h3 class="text-lg font-bold text-gray-900 mb-3">卡片激活</h3>
        <p class="text-gray-500 text-sm leading-relaxed">
          新卡首次认证、激活失败排查，ICCID 查询步骤，以及蜂窝网络/数据开通指引。
        </p>
      </div>

      <!-- 服务卡片 4：充值流量 -->
      <div class="bg-white rounded-xl p-8 shadow-sm border border-gray-100 hover-lift cursor-pointer">
        <div class="mb-5 text-orange-500">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
        </div>
        <h3 class="text-lg font-bold text-gray-900 mb-3">充值与流量</h3>
        <p class="text-gray-500 text-sm leading-relaxed">
          套餐与余量查询、充值异常处理，支持流量包购买，资费调整咨询。
        </p>
      </div>

    </div>
  </main>

      };

      // =============================================
      // ② 获取/生成本浏览器唯一 userId（会话隔离关键）
      // =============================================
      function getSessionName() {
        const KEY = 'coze_session_name';
        let name = localStorage.getItem(KEY);
        if (!name) {
          name = 'sess_' + Math.random().toString(36).slice(2) + '_' + Date.now();
          localStorage.setItem(KEY, name);
        }
        return name;
      }

      // =============================================
      // ③ 动态加载 jsrsasign 库（浏览器端签 JWT）
      // =============================================
      function loadJwtLib() {
        return new Promise((resolve, reject) => {
          if (window.KJUR?.jws?.JWS && window.KEYUTIL) { resolve(); return; }
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/8.0.20/jsrsasign-all-min.js';
          s.crossOrigin = 'anonymous';
          s.onload = () => window.KJUR?.jws?.JWS && window.KEYUTIL ? resolve() : reject(new Error('JWT库初始化失败'));
          s.onerror = () => reject(new Error('JWT库加载失败'));
          document.head.appendChild(s);
        });
      }

      // =============================================
      // ④ 用私钥签名 JWT（payload 含 session_name）
      // =============================================
      function signJwt(sessionName) {
        const now = Math.floor(Date.now() / 1000);
        const header = JSON.stringify({ alg: 'RS256', typ: 'JWT', kid: COZE_CONFIG.kid });
        const payload = JSON.stringify({
          iss: COZE_CONFIG.appId,
          aud: 'api.coze.cn',
          iat: now,
          exp: now + 3600,                         // JWT 有效期 1 小时
          jti: Math.random().toString(36).slice(2), // 防重放随机串
          session_name: sessionName                 // ✅ 会话隔离的核心！
        });
        const privateKey = COZE_CONFIG.privateKey
          .replace(/\r/g, '')
          .split('\n')
          .map(line => line.trim())
          .filter(Boolean)
          .join('\n');
        const prvKey = KEYUTIL.getKey(privateKey);
        return KJUR.jws.JWS.sign('RS256', header, payload, prvKey);
      }

      // =============================================
      // ⑤ 用 JWT 换取 Coze AccessToken
      // =============================================
      async function getAccessToken(jwt) {
        const res = await fetch('https://api.coze.cn/api/permission/oauth2/token', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + jwt
          },
          body: JSON.stringify({
            duration_seconds: 86399,
            grant_type: 'urn:ietf:params:oauth:grant-type:jwt-bearer'
          })
        });
        const data = await res.json();
        if (!data.access_token) throw new Error('获取Token失败：' + JSON.stringify(data));
        return data.access_token;
      }

      // =============================================
      // ⑥ 初始化 Coze Chat SDK
      // =============================================
      async function init() {
        try {
          await loadJwtLib();
          const sessionName = getSessionName();
          console.log('[Coze] session_name:', sessionName); // 不同浏览器此值不同 ✅
          const jwt = signJwt(sessionName);
          const accessToken = await getAccessToken(jwt);

          new CozeWebSDK.WebChatClient({
            config: { bot_id: COZE_CONFIG.botId },
            componentProps: { title: 'Coze' },
            auth: {
              type: 'token',
              token: accessToken,
              onRefreshToken: async () => {
                // Token 过期时自动重新获取
                const newJwt = signJwt(getSessionName());
                return await getAccessToken(newJwt);
              }
            },
            userInfo: {
              id: sessionName,
              nickname: '访客'
            }
          });

        } catch (err) {
          console.error('[Coze] 初始化失败：', err);
        }
      }

      init();

    })();
  </script>
